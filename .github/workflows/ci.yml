name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install grilly

      - name: Lint with ruff
        run: uv run ruff check cubemind/ tests/ benchmarks/

      - name: Run tests
        run: |
          uv run pytest tests/ -v -q \
            --ignore=tests/test_sinkhorn.py \
            -x \
            --tb=short \
            2>&1 | head -100

      - name: Run tests (full)
        run: |
          uv run pytest tests/ -v \
            --tb=short \
            --timeout=60

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install grilly datasets pillow huggingface-hub pyarrow

      - name: Smoke test benchmark (synthetic)
        run: |
          uv run python -c "
          from cubemind.model import CubeMind
          from cubemind.ops.block_codes import BlockCodes
          import numpy as np

          bc = BlockCodes(8, 64)
          model = CubeMind(k=8, l=64)

          # Quick forward pass
          phi = bc.random_discrete(seed=42)
          result = model.forward(phi=phi)
          print(f'Answer: {result[\"answer\"]}, confidence: {result[\"answer_confidence\"]:.4f}')
          assert result['step'] == 1
          print('Smoke test passed!')
          "

      - name: Test perception modules import
        run: |
          uv run python -c "
          from cubemind.perception.cnn_encoder import CNNEncoder
          from cubemind.perception.additive_ce import VSACodebook
          from cubemind.ops.block_codes import BlockCodes
          import numpy as np

          bc = BlockCodes(8, 64)
          codebook = VSACodebook(bc)
          print(f'Codebook: {codebook.n_codes} entries')

          enc = CNNEncoder(k=8, l=64, grid_size=(1,1))
          img = np.random.rand(80, 80).astype(np.float32)
          code = enc.forward(img)
          print(f'CNN encode: {code.shape}, sums={code.sum(axis=-1)[:4]}')
          print('Perception imports OK!')
          "
