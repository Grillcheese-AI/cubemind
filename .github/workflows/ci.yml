name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"
          uv pip install grilly

      - name: Lint with ruff
        run: uv run ruff check cubemind/ tests/ benchmarks/

      - name: Run tests
        run: |
          uv run pytest tests/ -v -q \
            --ignore=tests/test_sinkhorn.py \
            -x \
            --tb=short \
            2>&1 | head -100

      - name: Run tests (full)
        run: |
          uv run pytest tests/ -v \
            --tb=short \
            --timeout=60

  
